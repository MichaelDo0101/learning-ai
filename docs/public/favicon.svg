<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="ev-grad" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="ev-shine" x1="0" y1="0" x2="0" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="256" height="256" rx="56" ry="56" fill="url(#ev-grad)"/>

  <!-- Top shine highlight -->
  <rect width="256" height="256" rx="56" ry="56" fill="url(#ev-shine)"/>

  <!-- "ev" monogram: stylized e + v with vibe wave -->
  <!-- Letter "e" -->
  <path d="M 64 96
           Q 64 76, 84 76
           L 124 76
           Q 144 76, 144 96
           L 144 116
           Q 144 136, 124 136
           L 84 136
           L 84 152
           Q 84 164, 96 164
           L 138 164"
        fill="none"
        stroke="#ffffff"
        stroke-width="22"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Letter "v" with vibe wave tail -->
  <path d="M 160 96
           L 184 168
           L 208 96"
        fill="none"
        stroke="#ffffff"
        stroke-width="22"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Vibe sparkle dot -->
  <circle cx="208" cy="68" r="10" fill="#ffffff"/>
</svg>
